<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eShop</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Sidebar -->

    <aside id="sidebar" class="sidebar">

        <div class="sidebar-header">

            <h2>🛒 eShop</h2>

            <button id="closeSidebar">
                ✖
            </button>

        </div>

        <nav>

            <a href="index.html">
                🏠 Trang chủ
            </a>

            <a href="products.html">
                🛍 Sản phẩm
            </a>

            <a href="cart.html">
                🛒 Giỏ hàng
            </a>

            <a href="rewards.html">
                🎁 Phần thưởng
            </a>

        </nav>

    </aside>

    <div id="overlay" class="overlay"></div>

    <!-- Header -->

    <header class="header">

        <button id="menuBtn" class="menu-btn">
            ☰
        </button>

        <div class="logo">
            🛒 eShop
        </div>

        <div class="coin-display">
            🪙 <span id="coinBalance">0</span>
        </div>

    </header>

    <!-- Hero -->

    <section class="hero">

        <div class="hero-left">

            <p class="hero-badge">
                🔥 Khuyến mãi mùa hè - Giảm giá đến 50%
            </p>

            <h1>
                Chào mừng đến với eShop
            </h1>

            <p class="hero-description">
                Mua sắm thông minh với hàng ngàn sản phẩm
                chất lượng và ưu đãi hấp dẫn mỗi ngày.
            </p>

            <a href="products.html" class="btn">
                Mua Ngay
            </a>

        </div>

        <div class="hero-right">

            <div class="product-preview">
                🎧 Gaming Headset
            </div>

            <div class="product-preview">
                💻 Laptop
            </div>

            <div class="product-preview">
                📱 Smartphone
            </div>

        </div>

    </section>

    <script src="js/app.js"></script>
    <script src="js/coin.js"></script>

</body>
</html>
